name: Sync Upstream

on:
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: "Upstream repository (owner/name), empty uses default"
        required: false
        default: "lejianwen/rustdesk-api"
      upstream_branch:
        description: "Upstream branch, empty uses upstream default branch"
        required: false
        default: ""
      target_branch:
        description: "Target branch in this fork, empty uses repo default branch"
        required: false
        default: ""
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

concurrency:
  group: sync-upstream-${{ github.repository }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve sync parameters
        id: params
        shell: bash
        run: |
          set -euo pipefail
          UPSTREAM_REPO="${{ github.event.inputs.upstream_repo }}"
          UPSTREAM_BRANCH="${{ github.event.inputs.upstream_branch }}"
          TARGET_BRANCH="${{ github.event.inputs.target_branch }}"

          if [[ -z "${UPSTREAM_REPO}" ]]; then
            UPSTREAM_REPO="lejianwen/rustdesk-api"
          fi
          if [[ -z "${TARGET_BRANCH}" ]]; then
            TARGET_BRANCH="${{ github.event.repository.default_branch }}"
          fi
          if [[ -z "${UPSTREAM_BRANCH}" ]]; then
            UPSTREAM_BRANCH="$(git ls-remote --symref "https://github.com/${UPSTREAM_REPO}.git" HEAD | awk '/^ref:/ {sub("refs/heads/", "", $2); print $2; exit}')"
          fi

          echo "upstream_repo=${UPSTREAM_REPO}" >> "$GITHUB_OUTPUT"
          echo "upstream_branch=${UPSTREAM_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "target_branch=${TARGET_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Sync upstream into fork
        shell: bash
        run: |
          set -euo pipefail
          UPSTREAM_REPO="${{ steps.params.outputs.upstream_repo }}"
          UPSTREAM_BRANCH="${{ steps.params.outputs.upstream_branch }}"
          TARGET_BRANCH="${{ steps.params.outputs.target_branch }}"

          git remote add upstream "https://github.com/${UPSTREAM_REPO}.git" 2>/dev/null || true
          git remote set-url upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch origin "${TARGET_BRANCH}"
          git fetch upstream "${UPSTREAM_BRANCH}"

          git checkout -B "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"
          git merge --ff-only "upstream/${UPSTREAM_BRANCH}" || git merge --no-edit "upstream/${UPSTREAM_BRANCH}"
          git push origin "${TARGET_BRANCH}"

      - name: Summary
        run: |
          {
            echo "## Sync Result"
            echo "- Upstream: \`${{ steps.params.outputs.upstream_repo }}\`"
            echo "- Upstream branch: \`${{ steps.params.outputs.upstream_branch }}\`"
            echo "- Target branch: \`${{ steps.params.outputs.target_branch }}\`"
            echo "- Synced at: \`$(date -u '+%Y-%m-%d %H:%M:%S UTC')\`"
          } >> "$GITHUB_STEP_SUMMARY"
